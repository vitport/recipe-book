<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5722"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
  </defs>
  <!-- Background: orange gradient rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Pot body -->
  <rect x="9" y="19" width="14" height="10" rx="3" fill="white"/>
  <!-- Rim -->
  <rect x="7" y="17" width="18" height="3.5" rx="1.75" fill="white"/>
  <!-- Left handle -->
  <rect x="2" y="17.5" width="6" height="2.5" rx="1.25" fill="white"/>
  <!-- Right handle -->
  <rect x="24" y="17.5" width="6" height="2.5" rx="1.25" fill="white"/>
  <!-- Lid (filled arc) -->
  <path d="M8 17.5 Q16 10 24 17.5 Z" fill="white"/>
  <!-- Lid knob -->
  <circle cx="16" cy="12" r="2.5" fill="white"/>
  <!-- Steam: three wavy lines rising above the knob -->
  <path d="M13 9.5 C12.5 8 13.5 7 13 5.5" stroke="white" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M16 8.5 C15.5 7 16.5 6 16 4.5" stroke="white" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M19 9.5 C18.5 8 19.5 7 19 5.5" stroke="white" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.85"/>
</svg>
