<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 Voice Assistant Tests</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#FF6B35;--primary-l:#FF8C61;
  --bg:#FFF8F0;--text:#1F2937;--muted:#6B7280;--border:#E5E7EB;
  --pass:#10B981;--pass-bg:#D1FAE5;--fail:#EF4444;--fail-bg:#FEE2E2;
  --skip:#F59E0B;--skip-bg:#FEF3C7;
  --r:12px;--ease:all .25s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hdr{background:linear-gradient(135deg,#FF5722 0%,#FF6B35 40%,#FFB347 100%);
  padding:1.4rem 1.5rem 1.2rem;text-align:center;box-shadow:0 4px 24px rgba(255,107,53,.35);}
.hdr-title{font-size:2rem;font-weight:900;color:#fff;margin-bottom:.2rem;}
.hdr-sub{color:rgba(255,255,255,.9);font-size:.9rem;font-weight:700;}
.version-badge{display:inline-block;background:rgba(255,255,255,.9);color:#FF5722;
  font-weight:900;font-size:.85rem;padding:.2rem .75rem;border-radius:20px;margin-top:.5rem;}
.ctrl-bar{background:#fff;border-bottom:1px solid var(--border);
  padding:.9rem 1.5rem;display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;}
.spacer{flex:1;}
.btn{padding:.55rem 1.2rem;border-radius:50px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.87rem;transition:var(--ease);}
.btn-orange{background:linear-gradient(135deg,var(--primary),var(--primary-l));color:#fff;}
.btn-blue{background:#DBEAFE;color:#1D4ED8;}
.btn-green{background:linear-gradient(135deg,#10B981,#34D399);color:#fff;}
.btn-red{background:#FEE2E2;color:#991B1B;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.main{max-width:860px;margin:0 auto;padding:2rem 1.5rem;}
.group-title{font-size:1.1rem;font-weight:900;margin:1.5rem 0 .75rem;color:var(--primary);}
.test-row{background:#fff;border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:.5rem;
  display:flex;align-items:center;gap:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.test-id{font-size:.75rem;font-weight:900;color:var(--muted);min-width:2.5rem;}
.test-name{flex:1;font-weight:700;font-size:.9rem;}
.test-status{font-size:.8rem;font-weight:800;padding:.2rem .65rem;border-radius:20px;min-width:4.5rem;text-align:center;}
.status-pending{background:#F3F4F6;color:var(--muted);}
.status-pass{background:var(--pass-bg);color:var(--pass);}
.status-fail{background:var(--fail-bg);color:var(--fail);}
.status-skip{background:var(--skip-bg);color:var(--skip);}
.status-running{background:#DBEAFE;color:#1D4ED8;}
.test-detail{font-size:.78rem;color:var(--muted);margin-top:.25rem;}
.progress-bar-wrap{background:#F3F4F6;border-radius:50px;height:8px;overflow:hidden;margin:.75rem 0;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#FFB347);
  border-radius:50px;transition:width .4s ease;width:0%;}
.summary{display:flex;gap:1rem;flex-wrap:wrap;font-size:.82rem;margin-bottom:1rem;}
.stat{font-weight:800;}
.stat.pass{color:var(--pass)}.stat.fail{color:var(--fail)}.stat.skip{color:var(--skip)}
/* ── DEBUG PANEL ── */
#dbg-panel{position:fixed;bottom:0;left:0;right:0;height:30vh;
  background:#1a1a2e;display:none;flex-direction:column;z-index:9999;}
#dbg-handle{height:8px;background:#2a2a3e;cursor:ns-resize;display:flex;align-items:center;justify-content:center;}
#dbg-log{flex:1;overflow-y:auto;padding:.5rem;font-family:monospace;font-size:.75rem;}
#dbg-log::-webkit-scrollbar{width:4px;}
#dbg-log::-webkit-scrollbar-thumb{background:#3a3a5e;border-radius:2px;}
.dbg-entry{padding:.2rem 0;border-bottom:1px solid rgba(255,255,255,.05);}
.dbg-time{color:#888;margin-right:.4rem;}
.dbg-badge{padding:.05rem .3rem;border-radius:3px;font-size:.65rem;margin-right:.3rem;font-weight:700;}
.dbg-entry.log .dbg-msg{color:#fff;}
.dbg-entry.warn .dbg-badge{background:rgba(255,179,71,.25);color:#FFB347;}
.dbg-entry.warn .dbg-msg{color:#FFB347;}
.dbg-entry.error .dbg-badge{background:rgba(255,107,107,.25);color:#ff6b6b;}
.dbg-entry.error .dbg-msg{color:#ff6b6b;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🎤 Voice Assistant Test Suite</div>
  <div class="hdr-sub">VoiceAssistant.js Module Tests</div>
  <div style="margin-top:.5rem"><span class="version-badge">v2.3</span></div>
</div>

<div class="ctrl-bar">
  <button class="btn btn-orange" onclick="window.location.href='/voice-assistant.html'">← Voice Assistant</button>
  <button class="btn btn-green" id="btnRun" onclick="runAllTests()">▶ Run Tests</button>
  <button class="btn btn-red" id="btnStop" onclick="stopTests()" disabled>⏹ Stop</button>
  <div class="spacer"></div>
  <button class="btn btn-blue" onclick="window.location.href='/tests.html'">🧪 All Tests</button>
  <button class="btn btn-blue" id="btnDebug" onclick="window.location.href=location.pathname+(location.search?location.search+'&':'?')+'debug=true'">🐛 Debug</button>
</div>

<div class="main">
  <div class="progress-bar-wrap"><div class="progress-fill" id="progFill"></div></div>
  <div class="summary">
    <span class="stat pass">✅ <span id="cntPass">0</span> passed</span>
    <span class="stat fail">❌ <span id="cntFail">0</span> failed</span>
    <span class="stat skip">⏭️ <span id="cntSkip">0</span> skipped</span>
  </div>

  <div class="group-title">Group 1 — Module Tests</div>
  <div id="test-list"></div>
</div>

<div id="dbg-panel">
  <div id="dbg-handle" onmousedown="dbgDragStart(event)">
    <div style="color:#555;font-size:10px;letter-spacing:2px">━━━</div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 1rem;background:rgba(255,107,53,.15);border-bottom:1px solid #333;flex-shrink:0">
    <span style="color:#FF6B35;font-weight:700;font-size:.85rem">🐛 Voice Test Debug</span>
    <div style="display:flex;gap:.5rem">
      <button onclick="selectAllLogs()" style="background:#333;border:none;color:#aaa;padding:.2rem .6rem;border-radius:10px;cursor:pointer;font-size:.75rem">📋 Select All</button>
      <button onclick="document.getElementById('dbg-log').innerHTML=''" style="background:#333;border:none;color:#aaa;padding:.2rem .6rem;border-radius:10px;cursor:pointer;font-size:.75rem">🗑️ Clear</button>
      <button onclick="exitDebugMode()" style="background:#333;border:none;color:#aaa;padding:.2rem .6rem;border-radius:10px;cursor:pointer;font-size:.75rem">✕ Exit</button>
    </div>
  </div>
  <div id="dbg-log"></div>
</div>

<script>
const DEBUG = new URLSearchParams(location.search).has('debug');

function dbg(msg, level='log') {
  if (!DEBUG) return;
  const entry = document.createElement('div');
  entry.className = 'dbg-entry ' + level;
  const t = new Date().toTimeString().slice(0,8);
  entry.innerHTML = '<span class="dbg-time">' + t + '</span>' +
    '<span class="dbg-badge">' + level.toUpperCase() + '</span>' +
    '<span class="dbg-msg">' + msg + '</span>';
  const log = document.getElementById('dbg-log');
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function exitDebugMode() {
  window.location.href = window.location.href.replace(/[?&]debug=true/,'');
}

function selectAllLogs() {
  const range = document.createRange();
  range.selectNodeContents(document.getElementById('dbg-log'));
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  navigator.clipboard?.writeText(document.getElementById('dbg-log').innerText).catch(()=>{});
}

let _dbgDragging = false;
function dbgDragStart(e) {
  _dbgDragging = true;
  document.body.style.userSelect = 'none';
  document.addEventListener('mousemove', _dbgDragMove);
  document.addEventListener('mouseup', _dbgDragEnd);
}
function _dbgDragMove(e) {
  if (!_dbgDragging) return;
  const newH = Math.min(Math.max(window.innerHeight - e.clientY, 40), window.innerHeight * 0.8);
  document.getElementById('dbg-panel').style.height = newH + 'px';
  document.body.style.paddingBottom = newH + 'px';
}
function _dbgDragEnd() {
  _dbgDragging = false;
  document.body.style.userSelect = '';
  document.removeEventListener('mousemove', _dbgDragMove);
  document.removeEventListener('mouseup', _dbgDragEnd);
  localStorage.setItem('vt-dbg-height', document.getElementById('dbg-panel').style.height);
}

if (DEBUG) {
  const panel = document.getElementById('dbg-panel');
  panel.style.display = 'flex';
  const saved = localStorage.getItem('vt-dbg-height');
  if (saved) panel.style.height = saved;
  document.body.style.paddingBottom = panel.style.height || '30vh';
  document.getElementById('btnDebug').style.display = 'none';
  dbg('🧪 Voice Test Suite initialized — debug mode active');
}

const TESTS = [
  { id:'1.1', name:'VoiceAssistant module loads', fn: async() => {
    const r = await fetch('/modules/VoiceAssistant.js');
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    if(!text.includes('window.VoiceAssistant')) throw new Error('window.VoiceAssistant not found in module');
    return { details:'VoiceAssistant.js loaded, window.VoiceAssistant exported' };
  }},
  { id:'1.2', name:'VoiceAssistant has all required functions', fn: async() => {
    const r = await fetch('/modules/VoiceAssistant.js');
    const text = await r.text();
    const required = ['speak','listen','chat','setVoice','getVoices','stop','configure'];
    const missing = required.filter(fn => !text.includes('function ' + fn));
    if(missing.length) throw new Error('Missing functions: ' + missing.join(', '));
    return { details:'All ' + required.length + ' functions found: ' + required.join(', ') };
  }},
  { id:'1.3', name:'TTS voices endpoint returns list', fn: async() => {
    const r = await fetch('/api/tts/voices', {signal:AbortSignal.timeout(5000)});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if(!Array.isArray(data.voices)) throw new Error('voices field is not an array');
    return { details: data.voices.length + ' voice(s) — piperInstalled: ' + !!data.piperInstalled };
  }},
  { id:'1.4', name:'TTS speak endpoint exists', fn: async() => {
    const r = await fetch('/api/tts/speak', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text:'test', voice:'en_US-lessac-medium' }),
      signal: AbortSignal.timeout(8000)
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if(!data.audioData && !data.error) throw new Error('Response missing audioData and error fields');
    const mode = data.audioData ? 'Piper TTS (' + data.voice + ')' : 'Piper not installed — fallback: ' + data.fallback;
    return { details: 'Endpoint OK — ' + mode };
  }},
  { id:'1.5', name:'Browser TTS fallback available', fn: async() => {
    if(typeof window.speechSynthesis === 'undefined') throw new Error('speechSynthesis not available');
    if(typeof window.SpeechSynthesisUtterance === 'undefined') throw new Error('SpeechSynthesisUtterance not available');
    const voices = window.speechSynthesis.getVoices();
    return { details: 'Browser TTS available — ' + voices.length + ' voice(s) loaded' };
  }},
  { id:'1.6', name:'SpeechRecognition available', fn: async() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) { const e = new Error('SpeechRecognition not available in this browser'); e.isSkip = true; throw e; }
    return { details: 'SpeechRecognition available' };
  }},
  { id:'1.7', name:'🤖 Mistral understands voice command', fn: async() => {
    let ollamaOK = false;
    try {
      const s = await fetch('/api/ollama/status', {signal:AbortSignal.timeout(4000)});
      const d = await s.json();
      ollamaOK = !d.error && (d.models||[]).length > 0;
    } catch(e) {}
    if(!ollamaOK) { const e = new Error('Ollama not available'); e.isSkip = true; throw e; }

    const r = await fetch('/api/ollama/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'mistral:latest',prompt:'User said: "show me meat dinner recipes". Return JSON only: {"action":"","query":"","dishType":"","kosherType":"","response":""}. No ellipsis.',stream:false}),
      signal: AbortSignal.timeout(30000)
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const raw = (data.response||'').trim();
    const m = raw.match(/\{[\s\S]*?\}/);
    if(!m) throw new Error('No JSON found in Mistral response: ' + raw.slice(0,100));
    const intent = JSON.parse(m[0]);
    if(typeof intent.action === 'undefined') throw new Error('action field missing from intent');
    return { details: 'action="' + intent.action + '" query="' + (intent.query||'') + '"' };
  }},
  { id:'1.8', name:'Voice assistant app is accessible', fn: async() => {
    const r = await fetch('/voice-assistant.html');
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    if(!text.includes('VoiceAssistant')) throw new Error('VoiceAssistant not referenced in voice-assistant.html');
    return { details: 'voice-assistant.html loaded (' + Math.round(text.length/1024) + 'KB)' };
  }}
];

let stopped = false;

function renderTests() {
  const list = document.getElementById('test-list');
  list.innerHTML = TESTS.map(t => `
    <div class="test-row" id="row-${t.id.replace('.','_')}">
      <span class="test-id">${t.id}</span>
      <div style="flex:1">
        <div class="test-name">${t.name}</div>
        <div class="test-detail" id="detail-${t.id.replace('.','_')}"></div>
      </div>
      <span class="test-status status-pending" id="status-${t.id.replace('.','_')}">Pending</span>
    </div>`).join('');
}

function setStatus(id, state, detail) {
  const key = id.replace('.','_');
  const el = document.getElementById('status-' + key);
  const det = document.getElementById('detail-' + key);
  if(el) { el.className = 'test-status status-' + state; el.textContent = state === 'pass' ? '✅ Pass' : state === 'fail' ? '❌ Fail' : state === 'skip' ? '⏭ Skip' : '🔄 Running'; }
  if(det && detail) det.textContent = detail;
}

function updateStats(pass, fail, skip, total) {
  document.getElementById('cntPass').textContent = pass;
  document.getElementById('cntFail').textContent = fail;
  document.getElementById('cntSkip').textContent = skip;
  document.getElementById('progFill').style.width = (((pass+fail+skip)/total)*100) + '%';
}

async function runAllTests() {
  dbg('🚀 Starting ' + TESTS.length + ' tests');
  stopped = false;
  document.getElementById('btnRun').disabled = true;
  document.getElementById('btnStop').disabled = false;
  let pass=0, fail=0, skip=0;
  for(const t of TESTS) {
    if(stopped) break;
    setStatus(t.id, 'running', '');
    dbg('🧪 Running test ' + t.id + ': ' + t.name);
    try {
      const res = await t.fn();
      pass++;
      setStatus(t.id, 'pass', res && res.details ? res.details : '');
      dbg('✅ Test passed: ' + t.name + (res && res.details ? ' — ' + res.details : ''));
    } catch(e) {
      if(e.isSkip) {
        skip++;
        setStatus(t.id, 'skip', e.message);
        dbg('⏭️ Test skipped: ' + t.name + ' — ' + e.message, 'warn');
      } else {
        fail++;
        setStatus(t.id, 'fail', e.message);
        dbg('❌ Test failed: ' + t.name + ' — ' + e.message, 'error');
      }
    }
    updateStats(pass, fail, skip, TESTS.length);
  }
  document.getElementById('btnRun').disabled = false;
  document.getElementById('btnStop').disabled = true;
  dbg('🏁 Done — ✅ ' + pass + ' passed  ❌ ' + fail + ' failed  ⏭️ ' + skip + ' skipped');
}

function stopTests() { stopped = true; document.getElementById('btnStop').disabled = true; }

renderTests();
</script>
</body>
</html>
