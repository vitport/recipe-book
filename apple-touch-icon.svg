  <path d="M90 48 C87 40 93 34 90 26" stroke="white" stroke-width="7.5" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M107 53 C104 45 110 39 107 31" stroke="white" stroke-width="7.5" stroke-linecap="round" fill="none" opacity="0.85"/>
